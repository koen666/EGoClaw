<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lingbao</title>
    <link rel="stylesheet" href="./pet.css" />
  </head>
  <body>
    <div id="pet-shell" class="pet-shell" data-priority="idle">
      <div class="pet-stage">
        <div class="pet-glow" aria-hidden="true"></div>
        <div
          id="pet-avatar"
          class="pet-avatar"
          role="button"
          tabindex="0"
          aria-label="灵宝，点击打开当前行动"
        >
          <img id="pet-avatar-image" src="../assets/直立.jpg" alt="" />
        </div>
      </div>
      <p id="pet-status" class="sr-only" aria-live="polite"></p>
    </div>
    <script type="module" src="./pet.js"></script>
  </body>
</html>
