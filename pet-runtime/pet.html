<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lingbao</title>
    <link rel="stylesheet" href="./pet.css" />
  </head>
  <body>
    <div class="pet-shell">
      <div class="pet-avatar">
        <img src="../assets/lingbao-placeholder.svg" alt="灵宝" />
      </div>
      <div class="pet-bubble">
        <p class="eyebrow">灵宝</p>
        <p id="pet-message" class="pet-message"></p>
        <p id="pet-meta" class="pet-meta"></p>
        <div class="pet-actions">
          <button id="pet-start" class="primary-button">现在开始</button>
          <button id="pet-map" class="secondary-button">查看路径</button>
          <button id="pet-snooze" class="secondary-button">晚点提醒</button>
          <button id="pet-dismiss" class="secondary-button">不是这个</button>
        </div>
      </div>
    </div>
    <script type="module" src="./pet.js"></script>
  </body>
</html>
